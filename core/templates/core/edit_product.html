{% extends "core/base.html" %}

{% block title %}Редактировать: {{ product.name }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb text-shopper-muted small mb-0">
        <li class="breadcrumb-item"><a href="{% url 'product_detail' product.pk %}" class="text-decoration-none text-shopper-muted">{{ product.name }}</a></li>
        <li class="breadcrumb-item active text-shopper-cream" aria-current="page">Редактирование</li>
    </ol>
</nav>

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="panel-shopper p-4 p-lg-5">
            <h1 class="h3 page-heading mb-4">Редактировать товар</h1>
            <form method="post" action="{% url 'update_product' product.pk %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label" for="name">Название</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="price">Цена</label>
                    <input type="text" class="form-control" id="price" name="price" value="{{ product.price }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" for="brand">Бренд</label>
                    <select class="form-select" id="brand" name="brand" required>
                        {% for brand in brands %}
                        <option value="{{ brand.id }}" {% if brand.id == product.brand.id %}selected{% endif %}>{{ brand.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="d-flex flex-wrap gap-2">
                    <button type="submit" class="btn btn-accent">Сохранить</button>
                    <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-cream">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
