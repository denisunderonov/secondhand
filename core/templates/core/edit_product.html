{% extends "core/base.html" %}

{% block title %}Редактировать: {{ product.name }}{% endblock %}

{% block content %}
<div class="container-xxl px-3 py-4">
    <nav aria-label="breadcrumb" class="mb-4" data-aos="fade-up">
        <ol class="breadcrumb text-shopper-muted small mb-0">
            <li class="breadcrumb-item"><a href="{% url 'product_detail' product.pk %}" class="text-decoration-none text-shopper-muted">{{ product.name }}</a></li>
            <li class="breadcrumb-item active text-shopper-cream" aria-current="page">Редактирование</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-lg-7" data-aos="fade-up">
            <div class="panel-shopper p-4 p-lg-5">
                <h1 class="font-display h3 mb-4">Редактировать товар</h1>
                <form method="post" action="{% url 'update_product' product.pk %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="name">Название</label>
                        <input type="text" class="form-control form-control-lg" id="name" name="name" value="{{ product.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="price">Цена</label>
                        <input type="text" class="form-control form-control-lg" id="price" name="price" value="{{ product.price }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="brand">Бренд</label>
                        <select class="form-select form-select-lg" id="brand" name="brand" required>
                            {% for brand in brands %}
                            <option value="{{ brand.id }}" {% if brand.id == product.brand.id %}selected{% endif %}>{{ brand.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-accent btn-lg px-4">Сохранить</button>
                        <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-cream btn-lg">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
