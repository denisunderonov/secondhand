{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Second Hand{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link href="{% static 'core/css/shop.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="min-vh-100 d-flex flex-column">
    <header class="site-header shopper-nav navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-xxl">
            <a class="navbar-brand" href="{% url 'home' %}">Second Hand</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Меню">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-lg-1">
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}" href="{% url 'home' %}">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'catalog' or request.resolver_match.url_name == 'cat_category' %} active{% endif %}" href="{% url 'catalog' %}">Каталог</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container-xxl px-3">
            <div class="row align-items-center g-3">
                <div class="col-md-6">
                    <p class="site-footer__brand mb-1">Second Hand</p>
                    <p class="text-shopper-muted small mb-0">Винтаж и б/у — вещи со вторым шансом.</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="{% url 'catalog' %}" class="btn btn-outline-cream btn-sm">Перейти в каталог</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="{% static 'core/js/shop.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
