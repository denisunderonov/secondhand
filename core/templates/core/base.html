<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Second Hand{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --sh-bg: #1a1a1a;
            --sh-cream: #e8d8c9;
            --sh-slate: #4b607f;
            --sh-accent: #f3701e;
            --sh-text-muted: rgba(232, 216, 201, 0.65);
        }

        body {
            font-family: "Inter", system-ui, sans-serif;
            background-color: var(--sh-bg);
            color: var(--sh-cream);
        }

        .shopper-nav {
            background-color: var(--sh-slate) !important;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        }

        .shopper-nav .navbar-brand,
        .shopper-nav .nav-link {
            color: var(--sh-cream) !important;
        }

        .shopper-nav .nav-link {
            border-radius: 0.375rem;
            margin: 0 0.125rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .shopper-nav .nav-link:hover,
        .shopper-nav .nav-link:focus {
            background-color: rgba(26, 26, 26, 0.2);
            color: #fff !important;
        }

        .shopper-nav .nav-link.active {
            background-color: rgba(26, 26, 26, 0.35);
            font-weight: 600;
        }

        .text-shopper-muted {
            color: var(--sh-text-muted) !important;
        }

        .text-shopper-cream {
            color: var(--sh-cream) !important;
        }

        .text-accent {
            color: var(--sh-accent) !important;
        }

        .card-shopper {
            background-color: var(--sh-cream);
            color: #1a1a1a;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .card-shopper:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        }

        .card-shopper .card-img-top {
            border-radius: 1rem 1rem 0 0;
            object-fit: cover;
            max-height: 200px;
        }

        .panel-shopper {
            background-color: rgba(232, 216, 201, 0.08);
            border: 1px solid rgba(232, 216, 201, 0.12);
            border-radius: 1rem;
        }

        .list-group-shopper .list-group-item {
            background: transparent;
            border-color: rgba(232, 216, 201, 0.12);
            color: var(--sh-cream);
        }

        .list-group-shopper .list-group-item a {
            color: var(--sh-cream);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .list-group-shopper .list-group-item a:hover {
            color: var(--sh-accent);
        }

        .badge-shopper-count {
            background-color: var(--sh-slate);
            color: var(--sh-cream);
        }

        .page-heading {
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .btn-primary {
            --bs-btn-bg: var(--sh-slate);
            --bs-btn-border-color: var(--sh-slate);
            --bs-btn-hover-bg: #3d5069;
            --bs-btn-hover-border-color: #3d5069;
            --bs-btn-active-bg: #35455a;
            --bs-btn-active-border-color: #35455a;
        }

        .btn-accent {
            --bs-btn-color: #fff;
            --bs-btn-bg: var(--sh-accent);
            --bs-btn-border-color: var(--sh-accent);
            --bs-btn-hover-bg: #e06418;
            --bs-btn-hover-border-color: #e06418;
            --bs-btn-active-bg: #c85814;
            --bs-btn-active-border-color: #c85814;
        }

        .btn-outline-cream {
            --bs-btn-color: var(--sh-cream);
            --bs-btn-border-color: rgba(232, 216, 201, 0.5);
            --bs-btn-hover-bg: rgba(232, 216, 201, 0.12);
            --bs-btn-hover-border-color: var(--sh-cream);
            --bs-btn-hover-color: #fff;
        }

        .form-control,
        .form-select {
            background-color: rgba(232, 216, 201, 0.1);
            border-color: rgba(232, 216, 201, 0.25);
            color: var(--sh-cream);
        }

        .form-control:focus,
        .form-select:focus {
            background-color: rgba(232, 216, 201, 0.15);
            border-color: var(--sh-slate);
            color: var(--sh-cream);
            box-shadow: 0 0 0 0.2rem rgba(75, 96, 127, 0.35);
        }

        .form-label {
            color: var(--sh-text-muted);
        }

        .detail-hero {
            background: linear-gradient(145deg, rgba(75, 96, 127, 0.35), rgba(26, 26, 26, 0.9));
            border: 1px solid rgba(232, 216, 201, 0.1);
            border-radius: 1.25rem;
        }

        footer a {
            color: var(--sh-text-muted);
        }

        .breadcrumb-item + .breadcrumb-item::before {
            color: var(--sh-text-muted);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="min-vh-100 d-flex flex-column">
    <nav class="navbar navbar-expand-lg navbar-dark shopper-nav sticky-top">
        <div class="container-xxl">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Second Hand</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Меню">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto gap-lg-2">
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}" href="{% url 'home' %}">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'catalog' or request.resolver_match.url_name == 'cat_category' %} active{% endif %}" href="{% url 'catalog' %}">Каталог</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 container-xxl px-3 pb-5">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-top border-secondary border-opacity-25 mt-auto py-4">
        <div class="container-xxl px-3 d-flex flex-wrap justify-content-between align-items-center gap-2">
            <span class="text-shopper-muted small">Second Hand — минимализм и вещи со вторым шансом.</span>
            <a href="{% url 'catalog' %}" class="small text-decoration-none">Каталог</a>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
